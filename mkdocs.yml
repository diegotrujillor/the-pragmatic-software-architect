site_name: The Pragmatic Software Architect
site_description: From CRUD Developer to Software Architect in the AI Era (2026 Edition)
site_url: https://diegotrujillor.github.io/the-pragmatic-software-architect/
repo_url: https://github.com/diegotrujillor/the-pragmatic-software-architect
repo_name: the-pragmatic-software-architect
docs_dir: volumes
site_dir: site
extra_css:
  - stylesheets/extra.css

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Volumen 1 - Clean Architecture:
      - Introducción: volume-01-clean-architecture/00-introduccion.md
      - Por qué existe: volume-01-clean-architecture/01-por-que-existe.md
      - Dependency Rule: volume-01-clean-architecture/02-dependency-rule.md
      - Use Cases: volume-01-clean-architecture/03-use-cases.md
  - Volumen 2 - Domain-Driven Design:
      - Introducción: volume-02-ddd/00-introduccion.md
      - Entities y Value Objects: volume-02-ddd/01-entities-y-value-objects.md
      - Aggregates: volume-02-ddd/02-aggregates.md
      - Bounded Contexts: volume-02-ddd/03-bounded-contexts.md
      - Domain Events: volume-02-ddd/04-domain-events.md
  - Volumen 3 - Design Patterns:
      - Introducción: volume-03-design-patterns/00-introduccion.md
      - Strategy y Factory Method: volume-03-design-patterns/01-creacionales-strategy-factory.md
      - "Estructurales: Decorator, Adapter, Facade": volume-03-design-patterns/02-estructurales-decorator-adapter-facade.md
      - "Comportamiento: Command, Template Method": volume-03-design-patterns/03-comportamiento-command-template-method.md
      - La cadena de sinónimos: volume-03-design-patterns/04-la-cadena-de-sinonimos.md
  - Volumen 4 - Testing:
      - Introducción: volume-04-testing/00-introduccion.md
      - La pirámide de tests: volume-04-testing/01-piramide-de-tests.md
      - Mocks vs. Stubs: volume-04-testing/02-mocks-vs-stubs.md
      - AAA y tests legibles: volume-04-testing/03-aaa-y-tests-legibles.md
  - Volumen 5 - Microservices:
      - Introducción: volume-05-microservices/00-introduccion.md
      - Boundaries de servicio: volume-05-microservices/01-boundaries-de-servicio.md
      - Trade-offs reales: volume-05-microservices/02-trade-offs-reales.md
      - Cuándo NO usarlos: volume-05-microservices/03-cuando-no-usarlos.md
